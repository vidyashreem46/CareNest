<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareNest | Healthcare Reimagined</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- ===========================================================
                        SPLASH SCREEN
============================================================ -->

<section id="splash">

    <div class="splash-container">

        <img src="images/logo.png"
             alt="CareNest Logo"
             class="main-logo">

        <h1>

            CareNest

        </h1>

        <h2>

            ನಿಮ್ಮ ಆರೋಗ್ಯ, ನಮ್ಮ ಕಾಳಜಿ.

        </h2>

        <p class="quote">

            Technology that cares as much as you do.

        </p>

        <div class="progress-area">

            <div class="progress-bar">

                <div class="progress"></div>

            </div>

        </div>

        <p id="loading-text">

            Connecting Care...

        </p>

    </div>

</section>



<!-- ===========================================================
                    LANDING PAGE
============================================================ -->

<section id="landing-page">

    <nav>

        <img src="images/logo.png"
             class="nav-logo"
             alt="CareNest">

        <h3>

            CareNest

        </h3>

    </nav>

    <div class="hero">

        <img src="images/logo.png"
             class="hero-logo"
             alt="CareNest">

        <h1>

            Welcome to CareNest

        </h1>

        <h2>

            ನಿಮ್ಮ ಆರೋಗ್ಯ, ನಮ್ಮ ಕಾಳಜಿ.

        </h2>

        <p>

            Healthcare Reimagined for Every Family.

        </p>

        <button id="start-btn">

            Get Started

        </button>

    </div>

</section>



<!-- ===========================================================
                    LOGIN PAGE
============================================================ -->

<section id="login-page">

    <div class="login-wrapper">

        <div class="login-logo">

            <img src="images/logo.png"
                 alt="CareNest">

        </div>

        <h1>

            Welcome Back

        </h1>

        <p>

            Sign in to continue your healthcare journey.

        </p>

        <form>

            <div class="input-box">

                <label>

                    Username

                </label>

                <input
                       type="text"
                       placeholder="Enter Username">

            </div>

            <div class="input-box">

                <label>

                    Password

                </label>

                <input
                       type="password"
                       placeholder="Enter Password">

            </div>

            <button
                    type="submit">

                    Sign In

            </button>

        </form>

    </div>

</section>



<!-- Floating Background -->

<div class="blur one"></div>

<div class="blur two"></div>

<div class="blur three"></div>

<script src="script.js"></script>

</body>

</html>
