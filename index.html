<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNest - Your Healthcare Workspace</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <!-- ===================================================
                            SPLASH SCREEN
        ==================================================== -->
        <section id="splash-screen" class="screen active">
            <div class="splash-content">
                <div class="logo-box">
                    <img src="logo.png" alt="CareNest Logo" id="logo">
                </div>
                <h1 class="brand-name">CareNest</h1>
                <h2 class="kannada" lang="kn">ನಿಮ್ಮ ಆರೋಗ್ಯ, ನಮ್ಮ ಕಾಳಜಿ.</h2>
                <p class="brand-line">Technology that cares as much as you do.</p>
                
                <!-- NEW UNIQUE ECG HEARTBEAT LOADER -->
                <div class="heartbeat-loader-container">
                    <svg class="heartbeat-svg" viewBox="0 0 300 100">
                        <!-- Background faint pulse line -->
                        <path class="heartbeat-bg-track" d="M0,50 L80,50 L95,20 L110,80 L125,50 L140,50 L150,35 L160,65 L170,50 L300,50" />
                        <!-- Animated glowing pulse line -->
                        <path class="heartbeat-pulse" d="M0,50 L80,50 L95,20 L110,80 L125,50 L140,50 L150,35 L160,65 L170,50 L300,50" />
                    </svg>
                    <p class="loading-text">Connecting to CareNest Network...</p>
                </div>
            </div>
        </section>

        <!-- ===================================================
                        AUTH SCREEN (LOGIN / SIGN UP)
        ==================================================== -->
        <section id="auth-screen" class="screen">
            <div class="top-logo">
                <img src="logo.png" alt="CareNest Logo">
            </div>
            
            <div class="auth-card">
                <!-- Toggle Header -->
                <div class="auth-toggle-headers">
                    <button type="button" id="tab-login" class="tab-btn active">Sign In</button>
                    <button type="button" id="tab-signup" class="tab-btn">Register</button>
                </div>

                <div class="form-container">
                    <!-- 1. LOGIN FORM -->
                    <form id="login-form" class="auth-form active-form">
                        <h3>Welcome Back</h3>
                        <p class="form-sub">Enter your credentials to access your portal.</p>
                        
                        <div class="input-group">
                            <label for="login-username">Username or Email</label>
                            <input type="text" id="login-username" autocomplete="username" placeholder="doctor@carenest.org" required>
                        </div>
                        
                        <div class="input-group">
                            <label for="login-password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
                                <button type="button" class="toggle-password-btn" aria-label="Toggle password visibility">Show</button>
                            </div>
                        </div>

                        <div class="form-actions">
                            <a href="#" class="forgot-link" id="forgot-password-trigger">Forgot password?</a>
                        </div>
                        
                        <button type="submit" class="submit-btn">
                            <span class="btn-text">Sign In</span>
                            <span class="btn-loader hidden"></span>
                        </button>
                    </form>

                    <!-- 2. SIGN UP FORM (For First-Time Users) -->
                    <form id="signup-form" class="auth-form hidden-form">
                        <h3>Create Nest Account</h3>
                        <p class="form-sub">Register as a clinical or administrative staff member.</p>
                        
                        <div class="input-group">
                            <label for="signup-name">Full Name</label>
                            <input type="text" id="signup-name" placeholder="Dr. Sarah Alva" required>
                        </div>

                        <div class="input-group">
                            <label for="signup-email">Official Email</label>
                            <input type="email" id="signup-email" autocomplete="email" placeholder="sarah.alva@hospital.com" required>
                        </div>
                        
                        <div class="input-group">
                            <label for="signup-password">Create Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="signup-password" autocomplete="new-password" placeholder="At least 8 characters" required>
                                <button type="button" class="toggle-password-btn" aria-label="Toggle password visibility">Show</button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="signup-role">Your Specialization / Role</label>
                            <select id="signup-role" required>
                                <option value="" disabled selected>Select your role...</option>
                                <option value="doctor">Medical Specialist / Doctor</option>
                                <option value="nurse">Nursing Staff</option>
                                <option value="admin">Desk Administration</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="submit-btn">
                            <span class="btn-text">Register Account</span>
                            <span class="btn-loader hidden"></span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Custom Notification/Toast Element -->
    <div id="toast" class="toast hidden"></div>

    <!-- Background Decoration Circles -->
    <div class="circle one" aria-hidden="true"></div>
    <div class="circle two" aria-hidden="true"></div>
    <div class="circle three" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>
</html>
